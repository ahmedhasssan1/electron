services:
  postgres:
    image: postgres:16-alpine
    container_name: electron-pi-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USERNAME:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
      POSTGRES_DB: ${DB_NAME:-electron_pi}
    ports:
      - '${DB_PORT:-5432}:5432'
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test:
        [
          'CMD-SHELL',
          'pg_isready -U ${DB_USERNAME:-postgres} -d ${DB_NAME:-electron_pi}',
        ]
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    build: .
    container_name: electron-pi-app
    restart: unless-stopped
    ports:
      - '${PORT:-9000}:9000'
    env_file:
      - .env
    environment:
      NODE_ENV: ${NODE_ENV:-development}
      PORT: ${PORT:-9000}
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USERNAME: ${DB_USERNAME:-postgres}
      DB_PASSWORD: ${DB_PASSWORD:-postgres}
      DB_NAME: ${DB_NAME:-electron_pi}
      JWT_SECRET: ${JWT_SECRET:-1234}
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  pgdata:
